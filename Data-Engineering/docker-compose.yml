services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-etl_platform}
      POSTGRES_USER: ${DB_USER:-etl_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-etl_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-etl_user} -d ${DB_NAME:-etl_platform}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  etl:
    build: .
    command: [ "python", "-m", "app.etl" ]
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-etl_platform}
      DB_USER: ${DB_USER:-etl_user}
      DB_PASSWORD: ${DB_PASSWORD:-etl_password}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: [ "uvicorn", "app.api:app", "--host", "0.0.0.0", "--port", "8000" ]
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-etl_platform}
      DB_USER: ${DB_USER:-etl_user}
      DB_PASSWORD: ${DB_PASSWORD:-etl_password}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana-oss:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana-data:
