global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: sonarqube
    metrics_path: /api/monitoring/metrics
    static_configs:
      - targets: ["sonarqube:9000"]

  - job_name: jenkins
    static_configs:
      - targets: ["jenkins:8080"]
