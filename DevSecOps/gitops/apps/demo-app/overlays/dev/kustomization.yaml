apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: demo-dev
resources:
  - ../../base
nameSuffix: -dev
images:
  - name: ghcr.io/KishorKumarParoi/devsecops-demo-app
    newName: ghcr.io/KishorKumarParoi/devsecops-demo-app
    newTag: latest
patches:
  - target:
      kind: Deployment
      name: demo-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
