name: App Secure Delivery

on:
  push:
    branches: [main]
    paths:
      - sample-app/**
      - gitops/apps/demo-app/**
      - scripts/promote.sh
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  scan-build-sign:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/devsecops-demo-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: ./sample-app
          file: ./sample-app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/devsecops-demo-app:${{ steps.meta.outputs.version }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Cosign sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/devsecops-demo-app@${{ steps.build-push.outputs.digest }}

  deploy-dev-gitops:
    runs-on: ubuntu-latest
    needs: scan-build-sign
    if: github.ref == 'refs/heads/main'
    environment: dev
    concurrency:
      group: gitops-dev-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update dev overlay image and tag
        run: |
          FILE="gitops/apps/demo-app/overlays/dev/kustomization.yaml"
          sed -i.bak "s|^[[:space:]]*newName:.*|    newName: ghcr.io/${{ github.repository_owner }}/devsecops-demo-app|" "$FILE"
          sed -i.bak "s|^[[:space:]]*newTag:.*|    newTag: ${{ needs.scan-build-sign.outputs.image_tag }}|" "$FILE"
          rm -f "$FILE.bak"

      - name: Commit GitOps update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/demo-app/overlays/dev/kustomization.yaml
          git commit -m "gitops(dev): deploy image ${{ needs.scan-build-sign.outputs.image_tag }}" || echo "No changes"
          git push
