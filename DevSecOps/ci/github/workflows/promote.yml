name: GitOps Promote

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: Source environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
      target_env:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: write

jobs:
  validate-transition:
    runs-on: ubuntu-latest
    steps:
      - name: Validate allowed promotion path
        run: |
          SOURCE="${{ github.event.inputs.source_env }}"
          TARGET="${{ github.event.inputs.target_env }}"

          if [[ "$SOURCE" == "dev" && "$TARGET" == "staging" ]]; then
            echo "Valid promotion path: dev -> staging"
            exit 0
          fi

          if [[ "$SOURCE" == "staging" && "$TARGET" == "prod" ]]; then
            echo "Valid promotion path: staging -> prod"
            exit 0
          fi

          echo "Invalid promotion path: $SOURCE -> $TARGET"
          echo "Allowed: dev -> staging OR staging -> prod"
          exit 1

  promote-staging:
    runs-on: ubuntu-latest
    needs: validate-transition
    if: github.event.inputs.source_env == 'dev' && github.event.inputs.target_env == 'staging'
    environment: staging
    concurrency:
      group: gitops-staging-promote
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image tag
        run: |
          chmod +x scripts/promote.sh
          ./scripts/promote.sh "${{ github.event.inputs.source_env }}" "${{ github.event.inputs.target_env }}"

      - name: Commit promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/demo-app/overlays/${{ github.event.inputs.target_env }}/kustomization.yaml
          git commit -m "gitops(promote): ${{ github.event.inputs.source_env }} -> ${{ github.event.inputs.target_env }}" || echo "No changes"
          git push

  promote-prod:
    runs-on: ubuntu-latest
    needs: validate-transition
    if: github.event.inputs.source_env == 'staging' && github.event.inputs.target_env == 'prod'
    environment: prod
    concurrency:
      group: gitops-prod-promote
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image tag
        run: |
          chmod +x scripts/promote.sh
          ./scripts/promote.sh "${{ github.event.inputs.source_env }}" "${{ github.event.inputs.target_env }}"

      - name: Commit promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/demo-app/overlays/${{ github.event.inputs.target_env }}/kustomization.yaml
          git commit -m "gitops(promote): ${{ github.event.inputs.source_env }} -> ${{ github.event.inputs.target_env }}" || echo "No changes"
          git push
